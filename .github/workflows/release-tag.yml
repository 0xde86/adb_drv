# Manually-triggered semantic-version tag creation.

name: Release tag

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Compute the next version but do not tag/push
        type: boolean
        default: false
      custom_tag:
        description: Optional explicit version (e.g. v1.0.0). Overrides commit analysis.
        type: string
        required: false

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history is needed so the action can locate the previous tag.
          fetch-depth: 0

      - name: Compute next version & create tag
        id: tag
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b  # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: patch
          dry_run: ${{ inputs.dry_run }}
          custom_tag: ${{ inputs.custom_tag }}

      - name: Summary
        env:
          PREV: ${{ steps.tag.outputs.previous_tag }}
          NEW: ${{ steps.tag.outputs.new_tag }}
          BUMP: ${{ steps.tag.outputs.release_type }}
          CHANGELOG: ${{ steps.tag.outputs.changelog }}
        run: |
          {
            echo "## Tag result"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Previous tag | \`${PREV:-<none>}\` |"
            echo "| New tag      | \`${NEW:-<none>}\` |"
            echo "| Bump kind    | \`${BUMP:-<none>}\` |"
            echo "| Dry run      | \`${{ inputs.dry_run }}\` |"
            echo ""
            echo "## Changelog"
            echo ""
            echo "$CHANGELOG"
          } >> "$GITHUB_STEP_SUMMARY"