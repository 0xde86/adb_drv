# libFuzzer harness for adb_decode_mouse() (host clang).

name: Fuzz

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang
      - run: make fuzz FUZZ_TIME=30