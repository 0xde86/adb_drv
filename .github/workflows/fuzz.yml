# libFuzzer harness for adb_decode_mouse() (host clang).

name: Fuzz

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang
      - run: make fuzz FUZZ_TIME=30