#
# Firmware build (arm-none-eabi-gcc + Pico SDK), clang-tidy lint, and — on
# a `v*` tag — publish a GitHub Release with .uf2 + .elf attached (source
# archives are auto-attached by GitHub for tag releases).
#
# Pico SDK is cloned + cached per version; bump PICO_SDK_VERSION below.

name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  # Must match the version pinned in CMakeLists.txt
  PICO_SDK_VERSION: "2.2.0"
  # Must match the toolchain pinned in CMakeLists.txt
  ARM_TOOLCHAIN_VERSION: "15.2.Rel1"

jobs:
  firmware:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-tidy python3

      - name: Install arm-none-eabi-gcc ${{ env.ARM_TOOLCHAIN_VERSION }}
        uses: carlosperate/arm-none-eabi-gcc-action@98c40e51546516419841748d3210c290df0d2c6c  # v1
        with:
          release: ${{ env.ARM_TOOLCHAIN_VERSION }}

      - name: Cache Pico SDK
        id: cache-sdk
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: ~/pico-sdk
          key: pico-sdk-${{ env.PICO_SDK_VERSION }}

      - name: Clone Pico SDK ${{ env.PICO_SDK_VERSION }}
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          git clone --branch "${PICO_SDK_VERSION}" --depth 1 \
            https://github.com/raspberrypi/pico-sdk.git "$HOME/pico-sdk"
          git -C "$HOME/pico-sdk" submodule update --init --recursive --depth 1

      - name: Point CMake at the SDK
        run: echo "PICO_SDK_PATH=$HOME/pico-sdk" >> "$GITHUB_ENV"

      - name: Build firmware
        run: make strip

      - name: Run clang-tidy
        run: make tidy

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: firmware
          path: |
            build/adb_drv.uf2
            build/adb_drv.elf
          if-no-files-found: error

  release:
    name: GitHub release
    needs: firmware
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: firmware
          path: firmware

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          files: |
            firmware/adb_drv.uf2
            firmware/adb_drv.elf
          generate_release_notes: true
          fail_on_unmatched_files: true